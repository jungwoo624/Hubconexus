<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 | Hubconexus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle theme">☀️</button>

    <div class="container form-container">
        <a href="index.html" class="back-link">← 메인으로</a>
        <h1>제휴 문의</h1>
        <p class="form-desc">비즈니스 제휴 및 협력 문의를 남겨주시면 빠르게 연락드리겠습니다.</p>

        <form id="contact-form" action="https://formspree.io/f/xqegdbkb" method="POST">
            <div class="form-group">
                <label for="company">회사명 / 단체명 <span class="required">*</span></label>
                <input type="text" id="company" name="company" placeholder="회사명을 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="name">담당자 이름 <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="email">이메일 <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="example@company.com" required>
            </div>

            <div class="form-group">
                <label for="phone">연락처</label>
                <input type="tel" id="phone" name="phone" placeholder="010-0000-0000">
            </div>

            <div class="form-group">
                <label for="type">문의 유형 <span class="required">*</span></label>
                <select id="type" name="type" required>
                    <option value="" disabled selected>문의 유형을 선택하세요</option>
                    <option value="비즈니스 제휴">비즈니스 제휴</option>
                    <option value="마케팅 협력">마케팅 협력</option>
                    <option value="투자 문의">투자 문의</option>
                    <option value="기타">기타</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">문의 내용 <span class="required">*</span></label>
                <textarea id="message" name="message" rows="5" placeholder="문의 내용을 자세히 입력해 주세요." required></textarea>
            </div>

            <button type="submit" class="submit-btn">문의 보내기</button>
            <p id="form-status" class="form-status"></p>
        </form>
    </div>

    <script src="main.js"></script>
    <script>
        const form = document.getElementById('contact-form');
        const status = document.getElementById('form-status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = form.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = '전송 중...';
            status.textContent = '';
            status.className = 'form-status';

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });
                if (res.ok) {
                    status.textContent = '✅ 문의가 성공적으로 접수되었습니다. 감사합니다!';
                    status.className = 'form-status success';
                    form.reset();
                } else {
                    throw new Error();
                }
            } catch {
                status.textContent = '❌ 전송에 실패했습니다. 잠시 후 다시 시도해 주세요.';
                status.className = 'form-status error';
            } finally {
                btn.disabled = false;
                btn.textContent = '문의 보내기';
            }
        });
    </script>
</body>
</html>
